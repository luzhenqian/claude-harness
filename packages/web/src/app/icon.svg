<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hex Web: six interconnected nodes representing harness structure -->
  <!-- Hexagonal frame -->
  <polygon points="64,16 108,40 108,88 64,112 20,88 20,40" fill="none" stroke="#f59e0b" stroke-width="5" opacity="0.7"/>
  <!-- Internal cross-connections -->
  <line x1="64" y1="16" x2="108" y2="88" stroke="#f59e0b" stroke-width="3.5" opacity="0.5"/>
  <line x1="64" y1="16" x2="20" y2="88" stroke="#f59e0b" stroke-width="3.5" opacity="0.5"/>
  <line x1="108" y1="40" x2="20" y2="88" stroke="#f59e0b" stroke-width="3.5" opacity="0.5"/>
  <line x1="20" y1="40" x2="108" y2="88" stroke="#f59e0b" stroke-width="3.5" opacity="0.5"/>
  <line x1="64" y1="112" x2="108" y2="40" stroke="#f59e0b" stroke-width="3.5" opacity="0.5"/>
  <line x1="64" y1="112" x2="20" y2="40" stroke="#f59e0b" stroke-width="3.5" opacity="0.5"/>
  <!-- Vertex nodes -->
  <circle cx="64" cy="16" r="10" fill="#f59e0b"/>
  <circle cx="108" cy="40" r="10" fill="#f59e0b"/>
  <circle cx="108" cy="88" r="10" fill="#f59e0b"/>
  <circle cx="64" cy="112" r="10" fill="#f59e0b"/>
  <circle cx="20" cy="88" r="10" fill="#f59e0b"/>
  <circle cx="20" cy="40" r="10" fill="#f59e0b"/>
  <!-- Center glow -->
  <circle cx="64" cy="64" r="13" fill="#f59e0b" opacity="0.7"/>
  <circle cx="64" cy="64" r="7" fill="#fbbf24"/>
</svg>
